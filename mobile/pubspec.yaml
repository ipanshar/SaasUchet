name: saas_uchet_mobile
description: Mobile client for Saas Uchet.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  file_picker: ^11.0.2
  shared_preferences: ^2.3.2
  pdf: ^3.12.0
  printing: ^5.14.3
  excel: ^4.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/PTSans-Regular.ttf
    - assets/fonts/PTSans-Bold.ttf
