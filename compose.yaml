services:
  postgres:
    image: postgres:17-alpine
    container_name: saas-uchet-postgres
    environment:
      POSTGRES_DB: saas_uchet
      POSTGRES_USER: algotrade
      POSTGRES_PASSWORD: algotrade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algotrade -d saas_uchet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
